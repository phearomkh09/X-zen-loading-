<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X'zen Roleplay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="video.mp4" type="video/mp4">
</video>

<div id="snow"></div>

<div class="glass">

    <img src="logo.png" class="logo">

    <h1>X'zen Roleplay</h1>

    <p id="loading">Loading...</p>

    <div class="progress">
        <div class="bar"></div>
    </div>

    <div class="buttons">

        <button id="prev">⏮</button>

        <button id="play">⏸</button>

        <button id="next">⏭</button>

    </div>

    <audio id="music" autoplay loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="social">

        <a href="https://discord.gg/fDMa8SkdsD" target="_blank">
            Discord
        </a>

        <a href="https://youtube.com/@xzen-official" target="_blank">
            YouTube
        </a>

    </div>

    <div id="tips">
        Welcome to X'zen Roleplay
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
